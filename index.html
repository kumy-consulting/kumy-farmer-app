<!doctype html>
<html lang="fr" style="color-scheme: light; background: #f7f4e9">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-kumy.svg" />
    <link rel="apple-touch-icon" href="/logo-kumy.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#018675" />
    <meta name="color-scheme" content="light" />
    <meta name="description" content="L'application des agriculteurs Kumy : mes cultures, mes alertes, ma météo." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kumy" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet" />

    <title>Kumy — Mon exploitation</title>
  </head>
  <body style="margin: 0; background: #f7f4e9">
    <style>
      #kumy-preboot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Ubuntu', -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(180deg, #f7f4e9 0%, #edf3ea 35%, #d9e7db 68%, #bed4c0 100%);
        z-index: 9999;
      }
      #kumy-preboot img {
        width: 132px;
        height: auto;
        filter: drop-shadow(0 12px 28px rgba(1, 76, 65, 0.22));
        animation: kumyFloat 5s ease-in-out infinite;
      }
      #kumy-preboot .tag {
        margin-top: 22px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.38em;
        text-transform: uppercase;
        color: #014c41;
      }
      #kumy-preboot .dots {
        display: flex;
        gap: 7px;
        margin-top: 18px;
      }
      #kumy-preboot .dots i {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: linear-gradient(180deg, #2fa995 0%, #018675 55%, #014c41 100%);
        animation: kumyDot 1.4s ease-in-out infinite;
      }
      #kumy-preboot .dots i:nth-child(2) {
        animation-delay: 0.18s;
      }
      #kumy-preboot .dots i:nth-child(3) {
        animation-delay: 0.36s;
      }
      @keyframes kumyFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }
      @keyframes kumyDot {
        0%,
        100% {
          transform: translateY(0) scale(1);
          opacity: 0.35;
        }
        50% {
          transform: translateY(-6px) scale(1.15);
          opacity: 1;
        }
      }
    </style>
    <div id="root">
      <div id="kumy-preboot">
        <img src="/logo-kumy.svg" alt="Kumy" />
        <span class="tag">Mon exploitation</span>
        <div class="dots"><i></i><i></i><i></i></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
